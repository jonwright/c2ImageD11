name: release

on:
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  attach-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist-linux (x86_64)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: test.yml
          workflow_conclusion: success
          branch: master
          name: dist-linux
          path: dist/
          workflow_search: true
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dist-linux-aarch64
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: test-aarch64.yml
          workflow_conclusion: success
          branch: master
          name: dist-linux-aarch64
          path: dist/
          workflow_search: true
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dist-windows
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: test.yml
          workflow_conclusion: success
          branch: master
          name: dist-windows
          path: dist/
          workflow_search: true
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-upload as artifact (bridge to pypi-publish)
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: false

  pypi-publish:
    needs: attach-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download release wheels
        uses: actions/download-artifact@v4
        with:
          name: release-wheels
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
