name: c2ImageD11 tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version: ["2.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: c2ImageD11
          submodules: true

      - uses: actions/checkout@v4
        with:
          repository: jonwright/c2py23
          path: c2py23
          token: ${{ secrets.C2PY23_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python 2.7
        if: matrix.python-version == '2.7'
        run: |
          sudo apt-get update
          sudo apt-get install -y python2 python2-dev
          curl -sS https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          python2 get-pip.py
          pip install virtualenv
          virtualenv -p python2 /tmp/venv27
          echo "/tmp/venv27/bin" >> $GITHUB_PATH

      - name: Install test dependencies
        run: |
          pip install setuptools || pip install "setuptools<45"
          pip install wheel || pip install "wheel<0.35"
          pip install numpy || pip install "numpy==1.16.6"
          pip install pytest || pip install "pytest>=4.6,<5"
          # h5py+hdf5plugin needed for bslz4/bszstd tests (Python >= 3.8 only)
          pip install h5py hdf5plugin 2>/dev/null || true

      - name: Install c2py23
        run: |
          pip install --no-build-isolation -e ${{ github.workspace }}/c2py23

      - name: Install c2ImageD11
        run: |
          pip install --no-build-isolation -e ${{ github.workspace }}/c2ImageD11

      - name: Install ImageD11 (--no-deps, only C code needed)
        run: |
          pip install "git+https://github.com/jonwright/ImageD11.git" \
            --no-deps --no-build-isolation 2>/dev/null || \
          echo "ImageD11 not available"

      - name: Test
        run: |
          cd ${{ github.workspace }}/c2ImageD11
          python -m pytest tests/test_buffer.py tests/test_equivalence.py \
            tests/test_bslz4_ci.py \
            -v --tb=short -W ignore::DeprecationWarning
