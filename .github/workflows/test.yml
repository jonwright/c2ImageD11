name: c2ImageD11 tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["2.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: c2ImageD11

      - uses: actions/checkout@v4
        with:
          repository: jonwright/c2py23
          path: c2py23
          token: ${{ secrets.C2PY23_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python 2.7
        if: matrix.python-version == '2.7'
        run: |
          sudo apt-get update
          sudo apt-get install -y python2 python2-dev
          curl -sS https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          python2 get-pip.py
          pip install virtualenv
          virtualenv -p python2 /tmp/venv27
          echo "/tmp/venv27/bin" >> $GITHUB_PATH

      - name: Install ImageD11
        run: |
          pip install numpy pytest
          pip install fabio xfab scipy h5py 2>/dev/null || true
          pip install --no-build-isolation -e ${{ github.workspace }}/c2ImageD11/../ImageD11 2>/dev/null || \
          pip install ImageD11 2>/dev/null || \
          echo "ImageD11 not available - testing standalone"

      - name: Install c2py23
        run: |
          pip install -e ${{ github.workspace }}/c2py23

      - name: Install c2ImageD11
        run: |
          pip install -e ${{ github.workspace }}/c2ImageD11

      - name: Test
        run: |
          cd ${{ github.workspace }}/c2ImageD11
          python -m pytest tests/ -v --tb=short \
            -k "not TestBenchmark" \
            -W ignore::DeprecationWarning
