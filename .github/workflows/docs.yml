name: docs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download wheel from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: dist-linux
          path: dist/
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install c2ImageD11 wheel
        run: pip install dist/*.whl

      - name: Install ImageD11 (for comparison section)
        run: >
          pip install ImageD11 --only-binary :all: --no-deps
          || echo "ImageD11 not available"

      - name: Install doc deps
        run: pip install numpy c2py23 mkdocs-material

      - name: Generate docs
        run: python tools/generate_docs.py

      - name: Build site
        run: mkdocs build -f docs/mkdocs.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
